AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Daily Slack conversation summaries

Resources:
  SummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/index.handler
      Runtime: nodejs20.x
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          SLACK_TOKEN_PARAM: /1111-slack/slack-bot-token
          GITHUB_TOKEN_PARAM: /1111-slack/github-token
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - "arn:aws:bedrock:*::foundation-model/anthropic.claude-3-5-haiku-*"
                - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/us.anthropic.claude-3-5-haiku-*"
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/1111-slack/slack-bot-token"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/1111-slack/github-token"
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(11 17 * * ? *)
            Description: Run daily at 11:11 AM CST (17:11 UTC)
