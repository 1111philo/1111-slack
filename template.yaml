AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Daily Slack conversation summaries

Parameters:
  SlackBotToken:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /1111-slack/slack-bot-token

Resources:
  SummariesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: 1111-slack-summaries

  SummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/index.handler
      Runtime: nodejs20.x
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackBotToken
          SUMMARIES_BUCKET: !Ref SummariesBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref SummariesBucket
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "arn:aws:bedrock:us-east-2::foundation-model/us.anthropic.claude-sonnet-4-5-20250514-v1:0"
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)
            Description: Run daily at 6 AM UTC
